<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="asg0.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>

    <br><br>
    <label>V1: </label>

    x <input type="text" id="v1x" x="v1x" required
      minlength="4" maxlength="8" size="10">

    y <input type="text" id="v1y" y="v1y" required
      minlength="4" maxlength="8" size="10">

    <br>
    <label>V2: </label>
    x <input type="text" id="v2x" x="v2x" required
      minlength="4" maxlength="8" size="10">

    y <input type="text" id="v2y" y="v2y" required
      minlength="4" maxlength="8" size="10">

    <br>
    <button onclick="handleDrawEvent()">Draw</button>

    <br>
    <label for="operations">Operation:</label>
    <select name="operation" id="operations">
    <option value="">--Please choose an option--</option>
    <option value="add">Add</option>
    <option value="sub">Subtract</option>
    <option value="mul">Multiply</option>
    <option value="div">Divide</option>
    <option value="mag">Magnitude</option>
    <option value="norm">Normalize</option>
    <option value="angle">Angle Between</option>
    <option value="area">Area</option>
    </select>

    <label for="scalar">Scalar:</label>
    <input type="text" id="scalar" scalar="scalar"
      minlength="4" maxlength="8" size="10">

    <br>
    <button onclick="handleDrawOperationEvent()">Draw</button>
    
  </body>
</html>

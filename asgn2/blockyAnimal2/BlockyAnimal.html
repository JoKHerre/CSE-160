    <p>
      Left Wing
      <button type="button" id="animationLeftWingOnButton">ON</button>
      <button type="button" id="animationLeftWingOffButton">OFF</button>

      Joint 1: <input type="range" min="45" max="150" value="5" class="slider" id="leftWingJoint1">
      Joint 2: <input type="range" min="-15" max="15" value="5" class="slider" id="leftWingJoint2">
      Joint 3: <input type="range" min="-15" max="15" value="5" class="slider" id="leftWingJoint3">
    </p>
    
    <p>
      Right Wing
      <button type="button" id="animationRightWingOnButton">ON</button>
      <button type="button" id="animationRightWingOffButton">OFF</button>

      Joint 1: <input type="range" min="225" max="315" value="5" class="slider" id="rightWingJoint1">
      Joint 2: <input type="range" min="-15" max="15" value="5" class="slider" id="rightWingJoint2">
      Joint 3: <input type="range" min="-15" max="15" value="5" class="slider" id="rightWingJoint3">
    </p>

    <p>
      Left Leg
      <button type="button" id="animationLeftLegOnButton">ON</button>
      <button type="button" id="animationLeftLegOffButton">OFF</button>

      Joint 1: <input type="range" min="-30" max="30" value="5" class="slider" id="leftLegJoint1">
      Joint 2: <input type="range" min="-30" max="30" value="5" class="slider" id="leftLegJoint2">
      Joint 3: <input type="range" min="-30" max="30" value="5" class="slider" id="leftLegJoint3">
    </p>

    <p>
      Right Leg
      <button type="button" id="animationRightLegOnButton">ON</button>
      <button type="button" id="animationRightLegOffButton">OFF</button>

      Joint 1: <input type="range" min="-30" max="30" value="5" class="slider" id="rightLegJoint1">
      Joint 2: <input type="range" min="-30" max="30" value="5" class="slider" id="rightLegJoint2">
      Joint 3: <input type="range" min="-30" max="30" value="5" class="slider" id="rightLegJoint3">
    </p>

    <p>
      Camera Angle X: <input type="range" min="0" max="360" value="5" class="slider" id="angleSlideX">
    <p>
      Camera Angle Y: <input type="range" min="0" max="360" value="5" class="slider" id="angleSlideY">
